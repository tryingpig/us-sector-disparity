name: Update sector disparity data

on:
  schedule:
    # 장중 20분마다: 평일 13:00~21:40 UTC = 미 증시 개장~마감 (서머타임/표준시 09:30-16:00 ET 모두 커버)
    - cron: '*/20 13-21 * * 1-5'
    # 마감 확정: 평일 22:00 UTC = 미 증시 마감 후 (일봉 안정 후 공식 종가)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:        # 수동 실행도 허용

permissions:
  contents: write           # data/*.json 커밋·푸시용

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data & compute disparity
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 (휴장일 등) — 커밋 생략"
          else
            git commit -m "data: update sector disparity ($(date -u +%Y-%m-%d))"
            git push
          fi
